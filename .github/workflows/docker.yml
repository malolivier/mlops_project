name: Docker Build

on:
  push:
    branches: [main, dev]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - ".github/workflows/docker.yml"

jobs:
  build:
    name: Build de l'image Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: immoprix-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
